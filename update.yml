name: Fiyat & Stok Güncelle

on:
  schedule:
    - cron: '0 3 * * *'   # 06:00 TR
    - cron: '0 15 * * *'  # 18:00 TR
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Güncelle
        run: node .github/scripts/update.js
        env:
          WORKER: ${{ secrets.WORKER_URL }}
