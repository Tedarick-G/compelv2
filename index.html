<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>compelv2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <span class="logo">compelv2</span>
  <span class="site-tag">compel</span>
</header>

<main>
  <div id="brand-list"></div>

  <div id="toolbar" class="hidden">
    <span id="brand-title"></span>
    <span id="status"></span>
    <button id="btn-refresh">Güncelle</button>
    <button id="btn-init" class="hidden">ilk çekim</button>
  </div>
  <div id="notice" class="hidden"></div>
  <div id="table-wrap" class="hidden">
    <table>
      <thead>
        <tr>
          <th>Sıra</th>
          <th>Görsel</th>
          <th>SKU</th>
          <th>Marka</th>
          <th class="col-urun">Ürün / Varyant Adı</th>
          <th>Kategori</th>
          <th>Stok</th>
          <th>TL</th>
          <th>USD</th>
          <th>EUR</th>
          <th>EAN</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
