<!doctype html>
<meta charset="utf-8">

<div style="position:relative;display:inline-block">
<button onclick="x.hidden=!x.hidden">Marka Seç</button>

<div id="x" hidden style="position:absolute;background:#fff;border:1px solid #999;max-height:240px;overflow:auto">

<label><input type="checkbox" value="Rode|https://compel.com.tr/brand/24-rode|246"> Rode</label><br>
<label><input type="checkbox" value="Hosa|https://compel.com.tr/brand/13-hosa|296"> Hosa</label><br>

</div>
</div>

<button onclick="f()">Listele</button>

<pre id="o"></pre>

<script>

let W="https://13.tvkapora.workers.dev"

onmousedown=e=>x.hidden||x.contains(e.target)||e.target==x.previousElementSibling||(x.hidden=1)

async function f(){

let a=[...document.querySelectorAll('#x input:checked')].map(x=>{
let [name,url,count]=x.value.split('|')
return {name,url,count:+count}
})

let r=await fetch(W,{
method:'POST',
headers:{'content-type':'application/json'},
body:JSON.stringify(a)
})

let j=await r.json(),t=''

j.forEach(x=>{

t+=x.name+' : '+x.old+' / '+x.now+'\n'

for(let i=1;i<=Math.ceil(x.now/20);i++){

let u=i<2?x.url:x.url+'?page='+i

t+=u+'\n'
t+='▼ Ürünler: '+u+'\n'

}

t+='\n'

})

o.textContent=t

;[...o.textContent.matchAll(/▼ Ürünler: (.+)/g)].forEach(m=>{

o.innerHTML=o.innerHTML.replace(
'▼ Ürünler: '+m[1],
'<span onclick="g(this,\''+m[1]+'\')" style="cursor:pointer;color:blue">▼ Ürünler</span><div></div>'
)

})

}

async function g(el,u){

let box=el.nextElementSibling

if(el.dataset.open){

box.innerHTML=''
el.dataset.open=''
el.textContent='▼ Ürünler'

return

}

el.textContent="Yükleniyor..."

let r=await fetch(W+"?products="+encodeURIComponent(u))

let j=await r.json()

box.innerHTML=j.map(v=>`
<div>
<a href="${v}" target="_blank">${v}</a>
<span onclick="info(this,'${v}')" style="cursor:pointer;color:red"> ▶ Bilgi</span>
${v.includes('#')?'<span onclick="varlist(this,\''+v+'\')" style="cursor:pointer;color:green"> ▶ Varyantlar</span>':''}
<div></div>
</div>
`).join("<br>")

el.dataset.open=1
el.textContent="▲ Ürünleri Gizle"

}

async function info(el,link){

let box=el.nextElementSibling

if(el.dataset.open){

box.innerHTML=''
el.dataset.open=''
el.textContent=' ▶ Bilgi'
return

}

el.textContent="Yükleniyor..."

let r=await fetch(W+"?product="+encodeURIComponent(link))

let j=await r.json()

box.innerHTML=`
<table border=1 cellpadding=5>
<tr>
<th>Resim</th>
<th>Kod</th>
<th>Ad</th>
<th>Stok</th>
<th>USD</th>
<th>EUR</th>
<th>TRY</th>
<th>EAN</th>
</tr>
<tr>
<td><img src="${j.img}" width=50></td>
<td>${j.code||""}</td>
<td>${j.name||""}</td>
<td>${j.stock||""}</td>
<td>${j.usd||""}</td>
<td>${j.eur||""}</td>
<td>${j.try||""}</td>
<td>${j.ean||""}</td>
</tr>
</table>
`

el.dataset.open=1
el.textContent=" ▼ Gizle"

}

async function varlist(el,link){

let box=el.nextElementSibling

if(el.dataset.open){

box.innerHTML=''
el.dataset.open=''
el.textContent=" ▶ Varyantlar"
return

}

el.textContent="Yükleniyor..."

let r=await fetch(W+"?variants="+encodeURIComponent(link))

let j=await r.json()

box.innerHTML=j.map(v=>`<div><a href="${v}" target="_blank">${v}</a></div>`).join("")

el.dataset.open=1
el.textContent=" ▼ Varyantları Gizle"

}

</script>
