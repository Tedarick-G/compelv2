<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Compel KV Tarayıcı</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;border:1px solid #ccc;border-radius:6px;padding:15px;margin-bottom:20px}
button{padding:8px 14px;cursor:pointer}
.brandRow{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brandRow input[type=number]{width:70px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #ccc;padding:6px}
th{background:#eee}
img{max-width:60px}
#log{background:#000;color:#0f0;padding:10px;height:180px;overflow:auto;font-size:12px}
</style>

</head>
<body>

<div class="box">

Worker URL  
<input id="worker" style="width:420px" value="https://13.tvkapora.workers.dev/">

<br><br>

Batch Boyutu  
<input id="batch" type="number" value="10">

<br><br>

<div class="brandRow">
<label><input type="checkbox" value="Ableton|https://compel.com.tr/brand/1-ableton"> Ableton</label>
<input type="number" value="10">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Allen Heath|https://compel.com.tr/brand/48-allen-heath"> Allen Heath</label>
<input type="number" value="8">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Arturia|https://compel.com.tr/brand/4-arturia"> Arturia</label>
<input type="number" value="64">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Avid|https://compel.com.tr/brand/7-avid"> Avid</label>
<input type="number" value="16">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Genelec|https://compel.com.tr/brand/11-genelec"> Genelec</label>
<input type="number" value="25">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Hosa|https://compel.com.tr/brand/13-hosa"> Hosa</label>
<input type="number" value="296">
</div>

<div class="brandRow">
<label><input type="checkbox" value="M-Audio|https://compel.com.tr/brand/16-m-audio"> M-Audio</label>
<input type="number" value="50">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Numark|https://compel.com.tr/brand/20-numark"> Numark</label>
<input type="number" value="33">
</div>

<div class="brandRow">
<label><input type="checkbox" value="PreSonus|https://compel.com.tr/brand/21-presonus"> PreSonus</label>
<input type="number" value="97">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Rane|https://compel.com.tr/brand/23-rane"> Rane</label>
<input type="number" value="10">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Rode|https://compel.com.tr/brand/24-rode"> Rode</label>
<input type="number" value="246">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Universal Audio|https://compel.com.tr/brand/36-universal-audio"> Universal Audio</label>
<input type="number" value="72">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Warm Audio|https://compel.com.tr/brand/38-warm-audio"> Warm Audio</label>
<input type="number" value="79">
</div>

<br>

<button onclick="start()">Listele</button>

</div>


<div class="box">

<b>Log</b>

<div id="log"></div>

</div>


<div class="box">

<table>

<thead>
<tr>
<th>#</th>
<th>Görsel</th>
<th>Marka</th>
<th>Ürün</th>
<th>Varyant</th>
<th>SKU</th>
<th>EAN</th>
<th>Fiyat</th>
<th>Stok</th>
</tr>
</thead>

<tbody id="t"></tbody>

</table>

</div>


<script>

function log(txt){
let l=document.getElementById("log")
l.innerHTML+=txt+"<br>"
l.scrollTop=l.scrollHeight
}

async function start(){

let worker=document.getElementById("worker").value
let batch=parseInt(document.getElementById("batch").value)

let rows=[]

log("Tarama başlatıldı")

for(let r of document.querySelectorAll(".brandRow")){

let c=r.querySelector("input[type=checkbox]")
let n=r.querySelector("input[type=number]")

if(!c.checked) continue

let [name,url]=c.value.split("|")
let total=parseInt(n.value)

log("<br>MARKA → "+name)
log("Toplam ürün → "+total)

let start=0

while(start<total){

let limit=batch

if(start+limit>total)
limit=total-start

let api=worker+"?u="+encodeURIComponent(url)+"&limit="+limit

log("Batch → "+start+" - "+(start+limit))

try{

let res=await fetch(api)

if(!res.ok){
log("Worker hata → "+res.status)
break
}

let j=await res.json()

if(j.urunler){

rows.push(...j.urunler)

render(rows)

log("Gelen ürün → "+j.urunler.length)

}else{

log("Veri gelmedi")

}

}catch(e){

log("Fetch hata → "+e.message)

}

start+=limit

await sleep(700)

}

log("Marka tamamlandı → "+name)

}

log("<br>Tarama tamamlandı")

}

function render(rows){

let t=document.getElementById("t")
t.innerHTML=""

rows.forEach(r=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.sira_no||""}</td>
<td><img src="${r.kapak_gorsel||""}"></td>
<td>${r.marka_adi||""}</td>
<td>${r.urun_adi||""}</td>
<td>${r.varyant_adi||""}</td>
<td>${r.sku||""}</td>
<td>${r.ean||""}</td>
<td>${r.guncel_fiyat||""}</td>
<td>${r.stok||""}</td>
`

t.appendChild(tr)

})

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

</script>

</body>
</html>
