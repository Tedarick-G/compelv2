<div class="box">

<table>

<thead>
<tr>
<th>#</th>

<th>Marka</th>
<th>Ürün</th>
<th>Varyant</th>
<th>SKU</th>
<th>EAN</th>

<th>Stok</th>
</tr>
</thead>

<script>

document.querySelectorAll(".brandRow input[type=checkbox]").forEach(c=>{
c.onchange=()=>{
let n=c.parentNode.parentNode.querySelector("input[type=number]")
n.disabled=!c.checked
}
})


async function listele(){

let worker=document.getElementById("worker").value
let rows=[]

for(let r of document.querySelectorAll(".brandRow")){

let c=r.querySelector("input[type=checkbox]")
let n=r.querySelector("input[type=number]")

if(!c.checked)continue

let [name,url]=c.value.split("|")
let limit=n.value

let api=worker+"?u="+encodeURIComponent(url)+"&limit="+limit

let j=await fetch(api).then(r=>r.json())

rows.push(...j.urunler)

}

render(rows)

}


function render(rows){

let t=document.getElementById("t")
t.innerHTML=""

rows.forEach(r=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.sira_no||""}</td>
<td><img src="${r.kapak_gorsel||""}"></td>
<td>${r.marka_adi||""}</td>
<td>${r.urun_adi||""}</td>
<td>${r.varyant_adi||""}</td>
<td>${r.sku||""}</td>
<td>${r.ean||""}</td>
<td>${r.guncel_fiyat||""}</td>
<td>${r.stok||""}</td>
`

t.appendChild(tr)

})

}

</script>
