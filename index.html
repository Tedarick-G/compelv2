</div>

<button onclick=f()>Listele</button>

<div id=o style="white-space:pre-wrap"></div>

<script>

onmousedown=e=>x.hidden||x.contains(e.target)||e.target==x.previousElementSibling||(x.hidden=1)

async function f(){

let a=[...document.querySelectorAll('#x input:checked')].map(x=>{
let [name,url,count]=x.value.split('|')
return {name,url,count:+count}
})

if(!a.length)return o.textContent='Marka seç'

o.textContent='Yükleniyor...'

let r=await fetch('https://13.tvkapora.workers.dev',{
method:'POST',
headers:{'content-type':'application/json'},
body:JSON.stringify(a)
})

let j=await r.json()

o.innerHTML=''

j.forEach(x=>{

let d=document.createElement('div')

let h=document.createElement('div')
h.textContent=x.name+' : '+x.old+' / '+x.now+(x.diff>0?' [ '+x.diff+' Yeni Ürün ]':x.diff<0?' [ '+(-x.diff)+' Eksik Ürün ]':'')
d.appendChild(h)

for(let i=1;i<=Math.ceil((x.now||x.old)/20);i++){

let u=i<2?x.url:x.url+'?page='+i

let p=document.createElement('div')

let a=document.createElement('a')
a.href=u
a.textContent=u
a.target='_blank'

p.appendChild(a)

let btn=document.createElement('div')
btn.style.cursor='pointer'
btn.style.margin='3px 0 3px 0'
btn.textContent='▼ Ürünler'

let box=document.createElement('div')
box.style.margin='0 0 8px 15px'

btn.onclick=async()=>{

if(btn.dataset.open){

btn.dataset.open=''
btn.textContent='▼ Ürünler'
box.innerHTML=''
return

}

btn.textContent='Yükleniyor...'

let rr=await fetch('https://13.tvkapora.workers.dev?products='+encodeURIComponent(u))

let jj=await rr.json()

box.innerHTML=jj.map(v=>'<a href="'+v+'" target=_blank>'+v+'</a>').join('<br>')||'ürün yok'

btn.dataset.open=1
btn.textContent='▲ Ürünleri Gizle'

}

p.appendChild(btn)
p.appendChild(box)

d.appendChild(p)

}

d.appendChild(document.createElement('br'))

o.appendChild(d)

})

}

</script>
