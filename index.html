<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>compelv2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <span class="logo">compelv2</span>
  <span class="site-tag">compel</span>
</header>

<main>
  <section id="brands-section">
    <div id="brand-list"></div>
  </section>

  <section id="product-section" class="hidden">
    <div id="toolbar">
      <button id="btn-back">← geri</button>
      <span id="brand-title"></span>
      <div class="spacer"></div>
      <span id="status"></span>
      <span id="json-date"></span>
      <button id="btn-refresh">güncelle</button>
      <button id="btn-export">csv</button>
      <button id="btn-init" class="hidden">ilk çekim</button>
    </div>
    <div id="notice" class="hidden"></div>
    <div id="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>görsel</th>
            <th>sku</th>
            <th>marka</th>
            <th>ürün / varyant</th>
            <th>kategori</th>
            <th>stok</th>
            <th>fiyat ₺</th>
            <th>usd</th>
            <th>eur</th>
            <th>ean</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
