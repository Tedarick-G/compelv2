<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compel / T-Soft / Aide</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font:14px system-ui;background:#111;color:#eee}
    .wrap{max-width:1400px;margin:0 auto;padding:12px}
    .top{display:grid;gap:10px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,input,textarea,summary{font:inherit}
    button,.fake,.mini,summary{
      height:36px;border:1px solid #333;background:#1b1b1b;color:#eee;
      border-radius:8px;padding:0 12px
    }
    button{cursor:pointer}
    button:disabled{opacity:.5;cursor:default}
    details{position:relative}
    summary{display:flex;align-items:center;list-style:none;cursor:pointer;min-width:220px}
    summary::-webkit-details-marker{display:none}
    .menu{
      position:absolute;top:40px;left:0;z-index:5;width:320px;max-height:340px;overflow:auto;
      border:1px solid #333;background:#171717;border-radius:8px;padding:8px
    }
    .menu label{display:flex;gap:8px;align-items:center;padding:5px 4px}
    .menu label:hover{background:#202020}
    .mini{display:flex;align-items:center;justify-content:center;padding:0 8px}
    #aidePaste{
      width:110px;min-width:110px;max-width:110px;height:36px;resize:none;overflow:hidden;
      padding:8px 10px;text-align:center;line-height:18px
    }
    #aidePaste::placeholder{color:#eee;opacity:1}
    #st{min-height:20px;color:#9ad}
    .sec{margin-top:14px}
    h3{margin:0 0 6px;font-size:14px}
    .box{border:1px solid #333;border-radius:8px;background:#161616;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{border-bottom:1px solid #2a2a2a;padding:6px 8px;text-align:left;vertical-align:top;white-space:nowrap}
    th{position:sticky;top:0;background:#1a1a1a}
    .muted{color:#aaa}
    .new{color:#8f8}
    #moreWrap{padding:10px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="row">
        <details id="brandBox">
          <summary id="brandSummary">Marka Seç</summary>
          <div id="brandMenu" class="menu"></div>
        </details>

        <button id="tsoftDailyBtn" type="button">T-Soft Veri Yok</button>
        <button id="tsoftPickBtn" type="button">CSV Yükle</button>
        <input id="f2" type="file" accept=".csv,.txt" hidden />
        <label class="mini"><input id="tsoftSaveToday" type="checkbox" />&nbsp;kaydet</label>

        <button id="aideDailyBtn" type="button">Aide Veri Yok</button>
        <textarea id="aidePaste" class="fake" rows="1" placeholder="Yapıştır"></textarea>
        <label class="mini"><input id="aideSaveToday" type="checkbox" />&nbsp;kaydet</label>

        <button id="go" type="button">Listele</button>
      </div>

      <div id="st"></div>
    </div>

    <div class="sec">
      <h3>l1 Compel</h3>
      <div class="box"><table id="compelTable"></table></div>
      <div id="moreWrap"><button id="moreBtn" type="button" hidden></button></div>
    </div>

    <div class="sec">
      <h3>l2 T-Soft</h3>
      <div class="box"><table id="tsoftTable"></table></div>
    </div>

    <div class="sec">
      <h3>l3 Aide</h3>
      <div class="box"><table id="aideTable"></table></div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
