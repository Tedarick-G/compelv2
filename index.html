<button onclick="f()">Listele</button>
<pre id="o"></pre>

<script>
const W = 'https://13.tvkapora.workers.dev';

onmousedown = e => x.hidden || x.contains(e.target) || e.target == x.previousElementSibling || (x.hidden = 1);

async function f() {
  let a = [...document.querySelectorAll('#x input:checked')].map(x => {
    let [name, url, count] = x.value.split('|');
    return { name, url, count: +count };
  });

  if (!a.length) return o.textContent = 'Marka seç';

  o.textContent = 'Yükleniyor...';

  let r = await fetch(W, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(a)
  });

  let j = await r.json(), t = '';

  j.forEach(x => {
    t += x.name + ' : ' + x.old + ' / ' + x.now + (x.diff > 0 ? ' [ ' + x.diff + ' Yeni Ürün ]' : x.diff < 0 ? ' [ ' + (-x.diff) + ' Eksik Ürün ]' : '') + '\n';
    for (let i = 1; i <= Math.ceil((x.now || x.old) / 20); i++) {
      let u = i < 2 ? x.url : x.url + '?page=' + i;
      t += u + '\n';
      t += '▼ Ürünler: ' + u + '\n';
    }
    t += '\n';
  });

  o.textContent = t;

  [...o.textContent.matchAll(/▼ Ürünler: (.+)/g)].forEach(m => {
    let safeUrl = m[1].replace(/'/g, '&#39;');
    let s = o.innerHTML.replace(
      '▼ Ürünler: ' + m[1],
      '<span style="cursor:pointer" onclick="g(this,\'' + safeUrl + '\')">▼ Ürünler</span><div></div>'
    );
    o.innerHTML = s;
  });
}

async function g(el, u) {
  let box = el.nextElementSibling;

  if (el.dataset.open) {
    el.dataset.open = '';
    el.textContent = '▼ Ürünler';
    box.innerHTML = '';
    return;
  }

  el.textContent = 'Yükleniyor...';

  let r = await fetch(W + '?products=' + encodeURIComponent(u));
  let j = await r.json();

  box.innerHTML = j.map(v =>
    '<div style="margin:4px 0 8px 14px">' +
      '<a href="' + v + '" target="_blank">' + v + '</a>' +
      '<br>' +
      '<span style="cursor:pointer" onclick="gv(this,\'' + v.replace(/'/g, '&#39;') + '\')">▼ Varyantlar</span>' +
      '<div></div>' +
    '</div>'
  ).join('') || 'ürün yok';

  el.dataset.open = 1;
  el.textContent = '▲ Ürünleri Gizle';
}

async function gv(el, u) {
  let box = el.nextElementSibling;

  if (el.dataset.open) {
    el.dataset.open = '';
    el.textContent = '▼ Varyantlar';
    box.innerHTML = '';
    return;
  }

  el.textContent = 'Yükleniyor...';

  let r = await fetch(W + '?variants=' + encodeURIComponent(u));
  let j = await r.json();

  let vars = (j && j.variants) ? j.variants : [];

  box.innerHTML = vars.map(v =>
    '<div style="margin:4px 0 4px 14px">' +
      (v.variant_url
        ? '<a href="' + v.variant_url + '" target="_blank">' + (v.color || v.attribute) + ' → ' + v.variant_url + '</a>'
        : (v.color || v.attribute) + ' → link yok') +
    '</div>'
  ).join('') || 'varyant yok';

  el.dataset.open = 1;
  el.textContent = '▲ Varyantları Gizle';
}
</script>
