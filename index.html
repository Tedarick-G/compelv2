<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Varyant Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    .product-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .product-link {
      display: inline-block;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .variant-toggle {
      display: inline-block;
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      color: #0b57d0;
      margin: 10px 0;
    }

    .variant-box {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      background: #fafafa;
      display: none;
    }

    .variant-box.open {
      display: block;
    }

    .variant-status {
      margin-bottom: 10px;
      font-size: 14px;
      color: #666;
    }

    .variant-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .variant-list li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .variant-list li:last-child {
      border-bottom: none;
    }

    .variant-list a {
      word-break: break-all;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div class="product-card">
    <h2>Ürün</h2>

    <a
      class="product-link"
      id="productLink"
      href="https://compel.com.tr/ana-sayfa/1949-rode-interview-micro.html"
      target="_blank"
    >
      https://compel.com.tr/ana-sayfa/1949-rode-interview-micro.html
    </a>

    <div
      class="variant-toggle"
      id="variantToggle"
      data-product-url="https://compel.com.tr/ana-sayfa/1949-rode-interview-micro.html"
    >
      ▼ Varyantlar
    </div>

    <div class="variant-box" id="variantBox">
      <div class="variant-status" id="variantStatus">Hazır</div>
      <ul class="variant-list" id="variantList"></ul>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://compeltest.tvkapora.workers.dev/";

    const toggle = document.getElementById("variantToggle");
    const box = document.getElementById("variantBox");
    const statusEl = document.getElementById("variantStatus");
    const listEl = document.getElementById("variantList");

    let loaded = false;
    let loading = false;

    toggle.addEventListener("click", async function () {
      box.classList.toggle("open");

      if (!box.classList.contains("open")) {
        toggle.textContent = "▼ Varyantlar";
        return;
      }

      toggle.textContent = "▲ Varyantlar";

      if (loaded || loading) return;

      loading = true;
      statusEl.textContent = "Varyantlar yükleniyor...";
      listEl.innerHTML = "";

      try {
        const productUrl = toggle.dataset.productUrl;
        const endpoint = `${WORKER_URL}?variants=${encodeURIComponent(productUrl)}`;

        const resp = await fetch(endpoint);
        const data = await resp.json();

        if (!data.ok) {
          statusEl.innerHTML = `<span class="error">Hata: ${data.error || "Bilinmeyen hata"}</span>`;
          loading = false;
          return;
        }

        const variants = Array.isArray(data.variants) ? data.variants : [];

        if (!variants.length) {
          statusEl.textContent = "Varyant bulunamadı.";
          loaded = true;
          loading = false;
          return;
        }

        statusEl.textContent = `${variants.length} varyant bulundu`;

        for (const item of variants) {
          const li = document.createElement("li");

          const title = document.createElement("div");
          title.textContent = `${item.color || "Bilinmeyen"} (attribute: ${item.attribute})`;
          li.appendChild(title);

          if (item.variant_url) {
            const a = document.createElement("a");
            a.href = item.variant_url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = item.variant_url;
            li.appendChild(a);
          } else {
            const span = document.createElement("span");
            span.className = "error";
            span.textContent = "Link bulunamadı";
            li.appendChild(span);
          }

          listEl.appendChild(li);
        }

        loaded = true;
      } catch (err) {
        statusEl.innerHTML = `<span class="error">İstek hatası: ${err.message}</span>`;
      } finally {
        loading = false;
      }
    });
  </script>
</body>
</html>
