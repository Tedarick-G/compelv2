<!doctype html>
<meta charset="utf-8">
<input id="w" value="https://13.tvkapora.workers.dev/">

<div id="brands">
<label><input type="checkbox" value="Ableton|https://compel.com.tr/brand/1-ableton"> Ableton</label>
<label><input type="checkbox" value="Allen Heath|https://compel.com.tr/brand/48-allen-heath"> Allen Heath</label>
<label><input type="checkbox" value="Arturia|https://compel.com.tr/brand/4-arturia"> Arturia</label>
<label><input type="checkbox" value="Rode|https://compel.com.tr/brand/24-rode"> Rode</label>
<label><input type="checkbox" value="Warm Audio|https://compel.com.tr/brand/38-warm-audio"> Warm Audio</label>
</div>

<button onclick="run()">Listele</button>

<pre id="out"></pre>

<script>
const brands=document.querySelectorAll('#brands input')

brands.forEach(b=>{
  b.onchange=()=>{
    if(b.checked){
      const n=document.createElement('input')
      n.type='number'
      n.min=1
      n.value=5
      n.style.width='60px'
      n.className='limit'
      b.after(n)
    }else{
      b.nextSibling.remove()
    }
  }
})

async function run(){
  const w=document.getElementById('w').value
  const out=document.getElementById('out')
  out.textContent=''

  for(const b of brands){
    if(!b.checked)continue
    const limit=b.nextSibling.value
    const url=b.value.split('|')[1]

    const r=await fetch(`${w}?u=${encodeURIComponent(url)}&limit=${limit}`)
    const j=await r.json()

    out.textContent+=JSON.stringify(j,null,2)+"\n\n"
  }
}
</script>
