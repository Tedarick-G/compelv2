<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Compel Batch Tarayıcı</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.box{background:#fff;padding:15px;border:1px solid #ccc;border-radius:6px;margin-bottom:20px}
button{padding:8px 12px;cursor:pointer}
.brandRow{display:flex;gap:10px;margin-bottom:6px}
.brandRow input[type=number]{width:70px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #ccc;padding:6px}
th{background:#eee}
img{max-width:60px}
#log{background:#000;color:#0f0;padding:10px;height:180px;overflow:auto;font-size:12px}
</style>

</head>
<body>

<div class="box">

Worker URL  
<input id="worker" style="width:400px" value="https://13.tvkapora.workers.dev/">

<br><br>

Batch Boyutu  
<input id="batch" type="number" value="10">

<br><br>

<div class="brandRow">
<label><input type="checkbox" value="Rode|https://compel.com.tr/brand/24-rode"> Rode</label>
<input type="number" value="246">
</div>

<div class="brandRow">
<label><input type="checkbox" value="PreSonus|https://compel.com.tr/brand/21-presonus"> PreSonus</label>
<input type="number" value="97">
</div>

<div class="brandRow">
<label><input type="checkbox" value="Warm Audio|https://compel.com.tr/brand/38-warm-audio"> Warm Audio</label>
<input type="number" value="79">
</div>

<br>

<button onclick="start()">Batch Listele</button>

</div>


<div class="box">

<b>Tarama Log</b>

<div id="log"></div>

</div>


<div class="box">

<table>

<thead>
<tr>
<th>#</th>
<th>Görsel</th>
<th>Marka</th>
<th>Ürün</th>
<th>Varyant</th>
<th>SKU</th>
<th>Fiyat</th>
<th>Stok</th>
</tr>
</thead>

<tbody id="t"></tbody>

</table>

</div>


<script>

function log(t){

let l=document.getElementById("log")
l.innerHTML+=t+"<br>"
l.scrollTop=l.scrollHeight

}

async function start(){

let worker=document.getElementById("worker").value
let batch=parseInt(document.getElementById("batch").value)

let rows=[]

log("Tarama başladı")

for(let r of document.querySelectorAll(".brandRow")){

let c=r.querySelector("input[type=checkbox]")
let n=r.querySelector("input[type=number]")

if(!c.checked)continue

let [name,url]=c.value.split("|")
let total=parseInt(n.value)

log("<br>MARKA → "+name)
log("Toplam ürün → "+total)

let start=0

while(start<total){

let limit=batch

if(start+limit>total)
limit=total-start

let api=worker+"?u="+encodeURIComponent(url)+"&limit="+limit

log("Batch → "+start+" - "+(start+limit))

try{

let res=await fetch(api)

if(!res.ok){

log("Worker hata → "+res.status)
break

}

let j=await res.json()

if(j.urunler){

rows.push(...j.urunler)

render(rows)

log("Ürün geldi → "+j.urunler.length)

}else{

log("Veri yok")

}

}catch(e){

log("Fetch hata → "+e.message)

}

start+=limit

await sleep(600)

}

log("Marka tamamlandı → "+name)

}

log("<br>Tarama tamamlandı")

}

function render(rows){

let t=document.getElementById("t")

t.innerHTML=""

rows.forEach(r=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.sira_no||""}</td>
<td><img src="${r.kapak_gorsel||""}"></td>
<td>${r.marka_adi||""}</td>
<td>${r.urun_adi||""}</td>
<td>${r.varyant_adi||""}</td>
<td>${r.sku||""}</td>
<td>${r.guncel_fiyat||""}</td>
<td>${r.stok||""}</td>
`

t.appendChild(tr)

})

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

</script>

</body>
</html>
