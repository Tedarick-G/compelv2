<!doctype html>
<meta charset="utf-8">

<select id=b>
<option value="https://compel.com.tr/brand/24-rode">Rode</option>
<option value="https://compel.com.tr/brand/13-hosa">Hosa</option>
</select>

<button onclick=l()>Listele</button>

<table border=1 cellpadding=5 id=t>
<tr>
<th>Sıra</th>
<th>Resim</th>
<th>Marka</th>
<th>Ürün Kodu</th>
<th>Ürün Adı</th>
<th>Stok</th>
<th>USD</th>
<th>EUR</th>
<th>TRY</th>
<th>EAN</th>
<th>Link</th>
</tr>
</table>

<script>

async function l(){

let r=await fetch("WORKER_URL?brand="+b.value)

let j=await r.json()

t.innerHTML+=j.map((x,i)=>`
<tr>
<td>${i+1}</td>
<td><img src="${x.img}" width=50></td>
<td>${x.brand}</td>
<td>${x.code}</td>
<td>${x.name}</td>
<td>${x.stok||""}</td>
<td>${x.usd||""}</td>
<td>${x.eur||""}</td>
<td>${x.try||""}</td>
<td>${x.ean||""}</td>
<td><a href="${x.link}" target=_blank>link</a></td>
</tr>
`).join("")

}

</script>
