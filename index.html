<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compel KV Cache Loader</title>

<style>
*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:#eaeaea;
}

.app{
display:flex;
height:100vh;
width:100%;
overflow:hidden;
}

.sidebar{
width:380px;
min-width:380px;
max-width:380px;
padding:16px;
border-right:1px solid #2b2b2b;
background:#111;
display:flex;
flex-direction:column;
overflow:hidden;
}

.sidebar h2{
margin:0 0 12px 0;
font-size:22px;
}

.controls{
display:flex;
gap:8px;
margin-bottom:12px;
flex-wrap:wrap;
}

.controls button{
padding:10px 12px;
cursor:pointer;
background:#1e1e1e;
border:1px solid #333;
color:#fff;
border-radius:6px;
font-size:14px;
}

.controls button:hover{
background:#333;
}

.brand-list{
display:grid;
grid-template-columns:1fr;
gap:4px;
overflow:hidden;
flex:1;
align-content:start;
}

.brand-item{
display:flex;
align-items:center;
gap:8px;
padding:4px 2px;
font-size:14px;
line-height:1.15;
}

.brand-item input{
margin:0;
flex:0 0 auto;
}

.brand-item label{
cursor:pointer;
user-select:none;
word-break:break-word;
}

.main{
flex:1;
padding:16px;
display:flex;
flex-direction:column;
min-width:0;
overflow:hidden;
}

.main h3{
margin:0 0 12px 0;
font-size:20px;
}

.statusbar{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:12px;
padding:10px 12px;
background:#151515;
border:1px solid #2d2d2d;
border-radius:6px;
font-size:14px;
}

.statusbar span strong{
color:#fff;
}

#log{
flex:1;
width:100%;
background:#000;
padding:15px;
overflow:auto;
font-size:13px;
border:1px solid #333;
border-radius:6px;
font-family:monospace;
white-space:pre-wrap;
line-height:1.45;
}

@media (max-width:1100px){
.sidebar{
width:330px;
min-width:330px;
max-width:330px;
}
}

@media (max-width:860px){
.app{
flex-direction:column;
height:auto;
min-height:100vh;
overflow:auto;
}

.sidebar{
width:100%;
min-width:100%;
max-width:100%;
border-right:none;
border-bottom:1px solid #2b2b2b;
overflow:visible;
}

.brand-list{
overflow:visible;
}

.main{
min-height:60vh;
}
}
</style>
</head>

<body>

<div class="app">
  <aside class="sidebar">
    <h2>Markalar</h2>

    <div class="controls">
      <button type="button" id="selectAllBtn">Tümünü Seç</button>
      <button type="button" id="clearAllBtn">Temizle</button>
      <button type="button" id="scanBtn">Listele</button>
    </div>

    <div class="brand-list" id="brands"></div>
  </aside>

  <main class="main">
    <h3>Log</h3>

    <div class="statusbar">
      <span>Durum: <strong id="runStatus">Hazır</strong></span>
      <span>Aktif Marka: <strong id="activeBrand">-</strong></span>
      <span>Index: <strong id="activeIndex">-</strong></span>
      <span>Seçili Marka: <strong id="selectedCount">0</strong></span>
    </div>

    <div id="log"></div>
  </main>
</div>

<script>
const worker="https://compeltest.tvkapora.workers.dev"

const brands=[
["Ableton","https://compel.com.tr/brand/1-ableton"],
["Allen & Heath","https://compel.com.tr/brand/48-allen-heath"],
["Arturia","https://compel.com.tr/brand/4-arturia"],
["Avalon","https://compel.com.tr/brand/6-avalon"],
["Avid","https://compel.com.tr/brand/7-avid"],
["Compel","https://compel.com.tr/brand/49-compel"],
["Cranborne Audio","https://compel.com.tr/brand/41-cranborne-audio"],
["Crane Song","https://compel.com.tr/brand/9-crane-song"],
["Denon DJ","https://compel.com.tr/brand/10-denon-dj"],
["Fender Studio","https://compel.com.tr/brand/50-fender-studio"],
["Genelec","https://compel.com.tr/brand/11-genelec"],
["HeadRush","https://compel.com.tr/brand/12-headrush"],
["Hosa","https://compel.com.tr/brand/13-hosa"],
["M-Audio","https://compel.com.tr/brand/16-m-audio"],
["M-Game","https://compel.com.tr/brand/44-m-game"],
["Marantz Professional","https://compel.com.tr/brand/17-marantz-professional"],
["Numark","https://compel.com.tr/brand/20-numark"],
["PreSonus","https://compel.com.tr/brand/21-presonus"],
["Rane","https://compel.com.tr/brand/23-rane"],
["Rupert Neve Designs","https://compel.com.tr/brand/25-rupert-neve-designs"],
["RØDE","https://compel.com.tr/brand/24-rode"],
["RØDE X","https://compel.com.tr/brand/45-rode-x"],
["Sheeran Loopers","https://compel.com.tr/brand/47-sheeran-loopers"],
["Sibelius","https://compel.com.tr/brand/26-sibelius"],
["Sonarworks","https://compel.com.tr/brand/28-sonarworks"],
["SoundSwitch","https://compel.com.tr/brand/43-soundswitch"],
["Stanton","https://compel.com.tr/brand/42-stanton"],
["Universal Audio","https://compel.com.tr/brand/36-universal-audio"],
["Warm Audio","https://compel.com.tr/brand/38-warm-audio"]
]

const brandsDiv=document.getElementById("brands")
const logDiv=document.getElementById("log")
const runStatus=document.getElementById("runStatus")
const activeBrand=document.getElementById("activeBrand")
const activeIndex=document.getElementById("activeIndex")
const selectedCount=document.getElementById("selectedCount")
const selectAllBtn=document.getElementById("selectAllBtn")
const clearAllBtn=document.getElementById("clearAllBtn")
const scanBtn=document.getElementById("scanBtn")

let scannedLinks=new Set()
let audioCtx=null
let isRunning=false

function ensureAudio(){
if(!audioCtx){
audioCtx=new (window.AudioContext||window.webkitAudioContext)()
}
if(audioCtx.state==="suspended"){
audioCtx.resume()
}
}

function playTone(freq,duration,type="sine",volume=0.08,delay=0){
ensureAudio()

const now=audioCtx.currentTime+delay
const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.type=type
osc.frequency.setValueAtTime(freq,now)

gain.gain.setValueAtTime(0.0001,now)
gain.gain.exponentialRampToValueAtTime(volume,now+0.01)
gain.gain.exponentialRampToValueAtTime(0.0001,now+duration)

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start(now)
osc.stop(now+duration+0.03)
}

function playLiveLiveSound(){
playTone(920,0.08,"sine",0.08,0)
playTone(1240,0.10,"sine",0.08,0.09)
}

function playLiveKvSound(){
playTone(620,0.12,"triangle",0.08,0)
}

function playFinishSound(){
playTone(700,0.18,"sine",0.08,0)
playTone(900,0.22,"sine",0.08,0.18)
playTone(1200,0.45,"sine",0.08,0.40)
}

function playErrorSound(){
playTone(220,0.12,"sawtooth",0.06,0)
playTone(180,0.18,"sawtooth",0.06,0.10)
}

function playGenericLogSound(){
playTone(880,0.06,"sine",0.05,0)
}

function log(text,type="generic"){
logDiv.textContent+=text+"\n"
logDiv.scrollTop=logDiv.scrollHeight

if(type==="live_live"){
playLiveLiveSound()
}else if(type==="live_kv"){
playLiveKvSound()
}else if(type==="finish"){
playFinishSound()
}else if(type==="error"){
playErrorSound()
}else{
playGenericLogSound()
}
}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

function printProductData(obj){
let out=""
for(let k in obj){
out+=k+" : "+obj[k]+"\n"
}
return out
}

function getSoundTypeBySources(u){
if(u && u.src_fiyat_stok==="live" && u.src_specs==="live") return "live_live"
if(u && u.src_fiyat_stok==="live" && u.src_specs==="kv") return "live_kv"
return "generic"
}

function getCacheStateText(u){
if(u.src_fiyat_stok==="live" && u.src_specs==="live") return "LIVE SCRAPE (fiyat/stok: live, specs: live)"
if(u.src_fiyat_stok==="live" && u.src_specs==="kv") return "MIXED CACHE (fiyat/stok: live, specs: kv)"
if(u.src_fiyat_stok==="kv" && u.src_specs==="kv") return "KV CACHE (fiyat/stok: kv, specs: kv)"
return "DİĞER (fiyat/stok: "+(u.src_fiyat_stok||"-")+", specs: "+(u.src_specs||"-")+")"
}

function updateSelectedCount(){
selectedCount.textContent=String(document.querySelectorAll('input[name="brand"]:checked').length)
}

function setRunningState(running){
isRunning=running
scanBtn.disabled=running
selectAllBtn.disabled=running
clearAllBtn.disabled=running
document.querySelectorAll('input[name="brand"]').forEach(cb=>cb.disabled=running)
runStatus.textContent=running ? "Çalışıyor" : "Hazır"
}

async function scanBrand(name,url){
activeBrand.textContent=name
log("\n===== "+name+" TARANIYOR =====")

let skip=0

while(true){
activeIndex.textContent=String(skip)

let api=worker+"?u="+encodeURIComponent(url)+"&skip="+skip+"&stop=1"
log("\nindex="+skip)

try{
let r=await fetch(api)
let j=await r.json()

if(!j.urunler || j.urunler.length===0){
log("✔ BİTTİ (ürün kalmadı)","finish")
break
}

let list=j.urunler
let productLink=list[0].urun_linki

if(scannedLinks.has(productLink)){
log("✔ BİTTİ (aynı ürün tekrar geldi)","finish")
break
}

scannedLinks.add(productLink)

log("ürün linki: "+productLink)
log("varyant sayısı: "+list.length)

list.forEach((u,i)=>{
const soundType=getSoundTypeBySources(u)
const cacheState=getCacheStateText(u)

log("\n--- VARYANT "+(i+1)+" ---",soundType)
log("cache durumu: "+cacheState,soundType)
log(printProductData(u),soundType)
})
}catch(e){
log("HATA: "+e,"error")
}

skip++
await sleep(1000)
}

log("===== "+name+" TAMAMLANDI =====","finish")
}

async function scanSelected(){
if(isRunning) return

ensureAudio()

const checked=[...document.querySelectorAll('input[name="brand"]:checked')]
if(!checked.length){
log("Seçili marka yok.","error")
return
}

setRunningState(true)
scannedLinks=new Set()
log("\n===== SEÇİLEN MARKALAR TARAMA BAŞLADI =====","generic")

try{
for(const c of checked){
const name=c.dataset.name
const url=c.value
await scanBrand(name,url)
}

activeBrand.textContent="-"
activeIndex.textContent="-"
runStatus.textContent="Tamamlandı"
log("\n===== TÜM SEÇİLEN MARKALAR TAMAMLANDI =====","finish")
}catch(e){
runStatus.textContent="Hata"
log("GENEL HATA: "+e,"error")
}finally{
setRunningState(false)
activeBrand.textContent="-"
activeIndex.textContent="-"
}
}

brands.forEach((b,i)=>{
let row=document.createElement("div")
row.className="brand-item"

let cb=document.createElement("input")
cb.type="checkbox"
cb.name="brand"
cb.value=b[1]
cb.dataset.name=b[0]
cb.id="brand_"+i
cb.addEventListener("change",updateSelectedCount)

let label=document.createElement("label")
label.setAttribute("for","brand_"+i)
label.textContent=b[0]

row.appendChild(cb)
row.appendChild(label)
brandsDiv.appendChild(row)
})

selectAllBtn.addEventListener("click",()=>{
document.querySelectorAll('input[name="brand"]').forEach(cb=>{
cb.checked=true
})
updateSelectedCount()
})

clearAllBtn.addEventListener("click",()=>{
document.querySelectorAll('input[name="brand"]').forEach(cb=>{
cb.checked=false
})
updateSelectedCount()
})

scanBtn.addEventListener("click",scanSelected)

updateSelectedCount()
</script>

</body>
</html>
