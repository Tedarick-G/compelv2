<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>compelv2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="data-modal" class="modal hidden">
    <div class="modal-inner" style="width:320px">
      <p id="data-modal-title" style="margin-bottom:12px;font-size:13px"></p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="data-modal-existing"></button>
        <button id="data-modal-new"></button>
        <button id="data-modal-cancel">İptal</button>
      </div>
    </div>
  </div>

<div id="aide-modal" class="modal hidden">
  <div class="modal-inner">
    <textarea id="aide-paste" placeholder="Aide verisini buraya yapıştırın..."></textarea>
    <div class="modal-actions">
      <button id="aide-load">Yükle</button>
      <button id="aide-close">Kapat</button>
    </div>
  </div>
</div>

<main>
  <div id="brand-list"></div>

  <div id="toolbar" class="hidden">
    <span id="brand-title"></span>
    <span id="status"></span>
    <div id="data-inputs">
      <button id="tsoft-btn">T-Soft</button>
      <input type="file" id="tsoft-file" accept=".csv" style="display:none">
      <button id="aide-btn">Aide</button>
      <button id="btn-refresh">Güncelle</button>
      <button id="btn-init" class="hidden">ilk çekim</button>
    </div>
  </div>
  <div id="notice" class="hidden"></div>

  <div id="col-toggles" class="hidden">
    <label><input type="checkbox" data-col="0" checked> Sıra</label>
    <label><input type="checkbox" data-col="1" checked> Görsel</label>
    <label><input type="checkbox" data-col="2"> SKU</label>
    <label><input type="checkbox" data-col="3"> Marka</label>
    <label><input type="checkbox" data-col="4" checked> Ürün Adı</label>
    <label><input type="checkbox" id="chk-kutu-hasarli"> Garaj</label>
    <label><input type="checkbox" data-col="5"> Kategori</label>
    <label><input type="checkbox" data-col="6" checked> Compel Stok</label>
    <label><input type="checkbox" data-col="8" checked> Aide Stok</label>
    <label><input type="checkbox" data-col="7" checked> T-Soft Stok</label>
    <label><input type="checkbox" data-col="9" checked> TL</label>
    <label><input type="checkbox" data-col="10"> USD</label>
    <label><input type="checkbox" data-col="11"> EUR</label>
    <label><input type="checkbox" data-col="12" checked> T-Soft Fiyat</label>
    <label><input type="checkbox" data-col="14"> EAN</label>
    <label><input type="checkbox" data-col="15"> T-Soft EAN</label>
    <label><input type="checkbox" data-col="13" checked> Fark</label>
  </div>

  <div id="table-wrap" class="hidden">
    <table id="main-table">
      <thead>
        <tr>
          <th><button class="sort-btn" data-sort="idx">Sıra ↕</button></th>
          <th>Görsel</th>
          <th>SKU</th>
          <th>Marka</th>
          <th class="col-urun">Ürün Adı</th>
          <th>Kategori</th>
          <th class="sep-left"><button class="sort-btn" data-sort="stok">Compel Stok ↕</button></th>
          <th>Aide Stok</th>
          <th>T-Soft Stok</th>
          <th class="sep-left"><button class="sort-btn" data-sort="tl">Compel TL ↕</button></th>
          <th>USD</th>
          <th>EUR</th>
          <th>T-Soft Fiyat</th>
          <th>Fiyat Farkı</th>
          <th>EAN</th>
          <th>T-Soft EAN</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div id="unmatched" class="hidden">
    <div class="unmatched-col">
      <h3>T-Soft'ta var · Compel'de yok</h3>
      <table><thead><tr><th>Sıra</th><th>Tedarikçi Kodu</th><th class="col-urun">Ürün Adı</th><th class="sep-left">Compel Stok</th><th>Fiyat</th><th>Barkod</th></tr></thead>
      <tbody id="tbody-tsoft-only"></tbody></table>
    </div>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
