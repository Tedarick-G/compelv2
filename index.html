<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Compel Marka Tarayıcı</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:15px;border:1px solid #ccc;border-radius:6px;margin-bottom:20px}
button{padding:8px 12px;cursor:pointer}
#x{position:absolute;background:#fff;border:1px solid #999;max-height:260px;overflow:auto;min-width:320px;padding:10px}
.brandRow{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brandRow input[type="number"]{width:60px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #ccc;padding:6px}
th{background:#eee}
img{max-width:60px}
#log{background:#000;color:#0f0;padding:10px;font-size:12px;height:120px;overflow:auto}
</style>
</head>

<body>

<div class="box">

Worker URL  
<input id="worker" style="width:400px" value="https://13.tvkapora.workers.dev/">

<br><br>

<div style="position:relative;display:inline-block">
<button onclick="x.hidden=!x.hidden">Marka Seç</button>

<div id="x" hidden>

<div class="brandRow">
<label><input type="checkbox" data-max="10" value="Ableton|https://compel.com.tr/brand/1-ableton"> Ableton</label>
<input type="number" value="10" disabled>
</div>

<div class="brandRow">
<label><input type="checkbox" data-max="246" value="Rode|https://compel.com.tr/brand/24-rode"> Rode</label>
<input type="number" value="246" disabled>
</div>

<div class="brandRow">
<label><input type="checkbox" data-max="97" value="PreSonus|https://compel.com.tr/brand/21-presonus"> PreSonus</label>
<input type="number" value="97" disabled>
</div>

<div class="brandRow">
<label><input type="checkbox" data-max="79" value="Warm Audio|https://compel.com.tr/brand/38-warm-audio"> Warm Audio</label>
<input type="number" value="79" disabled>
</div>

</div>
</div>

<br><br>

<button onclick="listele()">Listele</button>

</div>

<div class="box">

<b>Log</b>

<div id="log"></div>

</div>

<div class="box">

<table>

<thead>
<tr>
<th>#</th>
<th>Görsel</th>
<th>Marka</th>
<th>Ürün</th>
<th>Varyant</th>
<th>SKU</th>
<th>EAN</th>
<th>Fiyat</th>
<th>Stok</th>
</tr>
</thead>

<tbody id="t"></tbody>

</table>

</div>


<script>

function log(msg){
let l=document.getElementById("log")
l.innerHTML+=msg+"<br>"
l.scrollTop=l.scrollHeight
}

document.querySelectorAll(".brandRow input[type=checkbox]").forEach(c=>{
c.onchange=()=>{
let n=c.parentNode.parentNode.querySelector("input[type=number]")
n.disabled=!c.checked
}
})

async function listele(){

let worker=document.getElementById("worker").value
let rows=[]
let brandCount=0

log("Tarama başladı")

for(let r of document.querySelectorAll(".brandRow")){

let c=r.querySelector("input[type=checkbox]")
let n=r.querySelector("input[type=number]")

if(!c.checked)continue

let [name,url]=c.value.split("|")
let limit=n.value

brandCount++

let api=worker+"?u="+encodeURIComponent(url)+"&limit="+limit

log("İstek gönderildi → "+name)

try{

let res=await fetch(api)

if(!res.ok){

log("Worker hata verdi → "+name+" ("+res.status+")")
continue

}

let j=await res.json()

if(!j || !j.urunler){

log("Veri yok → "+name)
continue

}

log("Başarılı → "+name+" ("+j.urunler.length+" ürün)")

rows.push(...j.urunler)

}catch(err){

log("Fetch hata → "+name+" : "+err.message)

}

}

if(rows.length===0){

log("Hiç veri gelmedi")

}

render(rows)

log("Tarama tamamlandı")

}


function render(rows){

let t=document.getElementById("t")
t.innerHTML=""

rows.forEach(r=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.sira_no||""}</td>
<td><img src="${r.kapak_gorsel||""}"></td>
<td>${r.marka_adi||""}</td>
<td>${r.urun_adi||""}</td>
<td>${r.varyant_adi||""}</td>
<td>${r.sku||""}</td>
<td>${r.ean||""}</td>
<td>${r.guncel_fiyat||""}</td>
<td>${r.stok||""}</td>
`

t.appendChild(tr)

})

}

</script>

</body>
</html>
