name: WordPress Sync
on:
  schedule:
    - cron: '0 3 * * *'    # 06:00 TR
    - cron: '0 15 * * *'   # 18:00 TR
  workflow_dispatch:
    inputs:
      marka:
        description: 'Marka slug (örn: rode, headrush) — boş bırakırsan aktif tüm markalar'
        required: false
        default: ''
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: WordPress Sync
        env:
          WORKER: ${{ secrets.WORKER_URL }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_SECRET: ${{ secrets.WP_SECRET }}
          MARKA: ${{ github.event.inputs.marka }}
        run: |
          node << 'JS'
          const WORKER    = process.env.WORKER;
          const WP_URL    = process.env.WP_URL;
          const WP_SECRET = process.env.WP_SECRET;
          const MARKA     = (process.env.MARKA || '').trim();
          const DELAY     = 3000;
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          async function wpPost(endpoint, body) {
            const r = await fetch(`${WP_URL}/wp-json/fs/v1/${endpoint}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-fs-secret': WP_SECRET },
              body: JSON.stringify(body)
            });
            const text = await r.text();
            console.log(`  [${endpoint}] HTTP ${r.status}: ${text.slice(0,200)}`);
            try { return JSON.parse(text); } catch { return {}; }
          }

          async function productExists(source_url) {
            const res = await wpPost('product-exists', { source_url });
            return res.exists ? res.product_id : 0;
          }

          function groupByLink(urunler) {
            const map = new Map();
            for (const u of urunler) {
              const key = u.urun_linki;
              if (!map.has(key)) map.set(key, []);
              map.get(key).push(u);
            }
            return map;
          }

          function parseVariantParam(varyant_adi) {
            if (!varyant_adi) return null;
            const parts = varyant_adi.split(':');
            if (parts.length < 2) return null;
            const adi = parts[0].trim().toLowerCase();
            const etiket = parts.slice(1).join(':').trim();
            const deger = etiket.toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[çÇ]/g, 'c').replace(/[ğĞ]/g, 'g')
              .replace(/[ıİ]/g, 'i').replace(/[öÖ]/g, 'o')
              .replace(/[şŞ]/g, 's').replace(/[üÜ]/g, 'u')
              .replace(/[^a-z0-9-]/g, '');
            return { adi, etiket, deger };
          }

          async function syncGrup(rows, marka_adi) {
            const base = rows[0];
            const source_url = base.urun_linki;
            if (!source_url) return;

            const variants = rows.map(u => {
              const param = parseVariantParam(u.varyant_adi);
              return {
                sku:          u.sku || '',
                ean:          u.ean || '',
                price_text:   String(u.guncel_fiyat || ''),
                stock_status: String(u.stok ?? ''),
                image_url:    u.kapak_gorsel || '',
                parametreler: param ? [{ adi: param.adi, etiket: param.etiket, deger: param.deger }] : [],
              };
            });

            const product_id = await productExists(source_url);

            if (product_id) {
              await wpPost('compel-sync', {
                product_id,
                store_name:   'Compel',
                source_url,
                price_text:   String(base.guncel_fiyat || ''),
                stock_status: String(base.stok ?? ''),
                variants,
              });
            } else {
              await wpPost('import-product', {
                product_name:  base.urun_adi || '',
                source_url,
                brand:         base.marka_adi || marka_adi || '',
                category_name: base.kategori_adi || '',
                product_code:  base.sku  || '',
                ean:           base.ean  || '',
                price_text:    String(base.guncel_fiyat || ''),
                stock_status:  String(base.stok ?? ''),
                image_url:     base.kapak_gorsel || '',
                variants,
              });
            }
          }

          async function syncMarka(slug) {
            console.log(`Marka: ${slug}`);
            const kvRes = await fetch(`${WORKER}?get=${slug}`);
            if (kvRes.status === 404) { console.log(`  KVde yok, atlanıyor`); return; }
            const data = await kvRes.json();
            const urunler = data.urunler || [];
            console.log(`  ${urunler.length} satır bulundu`);

            const gruplar = groupByLink(urunler);
            console.log(`  ${gruplar.size} tekil ürün`);

            for (const [link, rows] of gruplar) {
              try { await syncGrup(rows, slug); }
              catch(e) { console.warn(`  HATA (${link}): ${e.message}`); }
              await sleep(DELAY);
            }
          }

          async function getActiveMarkas() {
            const r = await fetch(`${WP_URL}/wp-json/fs/v1/active-brands`, {
              headers: { 'x-fs-secret': WP_SECRET }
            });
            if (!r.ok) return null;
            const data = await r.json();
            return data.brands || null;
          }

          async function main() {
            console.log(`WP_URL: ${WP_URL}`);

            if (MARKA) {
              await syncMarka(MARKA);
              console.log('Tamamlandi');
              return;
            }

            // Aktif markaları WP'den çek
            const activeMarkas = await getActiveMarkas();

            if (activeMarkas) {
              console.log(`${activeMarkas.length} aktif marka (WP panelinden)`);
              for (const slug of activeMarkas) {
                await syncMarka(slug);
                await sleep(3000);
              }
            } else {
              // Fallback: tüm markalar
              console.log('Aktif marka listesi alınamadı, tüm markalar işleniyor');
              const res = await fetch(`${WORKER}?brands`);
              const brands = (await res.json()).brands || [];
              console.log(`${brands.length} marka`);
              for (const b of brands) {
                await syncMarka(b.slug);
                await sleep(3000);
              }
            }

            console.log('Tamamlandi');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          JS
